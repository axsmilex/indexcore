name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage (JUnit 5 + jqwik + JaCoCo)
        run: mvn -B clean test

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      - name: Run mutation testing (PIT)
        run: mvn -B org.pitest:pitest-maven:mutationCoverage

      - name: Upload PIT mutation report
        uses: actions/upload-artifact@v4
        with:
          name: pit-mutation-report
          path: target/pit-reports/

      - name: Fail build if tests failed
        if: failure()
        run: echo "Build failed -- check the test/coverage/mutation logs above." && exit 1
